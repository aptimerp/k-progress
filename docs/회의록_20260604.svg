  <text x="68" y="1283" font-size="12" fill="#CBD5E1">기초자료 전산 구축 + 핵심 출력물(ERP 화면) <tspan fill="#FFFFFF" font-weight="bold">우선 개발</tspan></text>

  <rect x="52" y="1298" width="8" height="8" rx="2" fill="#E8922A"/>
  <text x="68" y="1307" font-size="12" fill="#CBD5E1">복잡·변동 잦은 항목: <tspan fill="#FFFFFF" font-weight="bold">수기 병행 후 후순위 자동화</tspan></text>

  <rect x="52" y="1322" width="8" height="8" rx="2" fill="#E8922A"/>
  <text x="68" y="1331" font-size="12" fill="#CBD5E1">비용 이체(보은) + 부서기반 검증 로직 병행 → <tspan fill="#FFFFFF" font-weight="bold">전산화 난이도 절감</tspan></text>

  <rect x="52" y="1346" width="8" height="8" rx="2" fill="#E8922A"/>
  <text x="68" y="1355" font-size="12" fill="#CBD5E1">단계별 병행(엑셀 유지 + 전산화): <tspan fill="#FFFFFF" font-weight="bold">최소 1년 검토 병행 권장</tspan></text>

  <rect x="52" y="1370" width="8" height="8" rx="2" fill="#E8922A"/>
  <text x="68" y="1379" font-size="12" fill="#CBD5E1">검증자료 확보 + <tspan fill="#FFFFFF" font-weight="bold">회계 승인 프로세스</tspan> 필수 재확인</text>

  <!-- 푸터 -->
  <rect x="0" y="1440" width="900" height="40" fill="#1A3A5C" opacity="0.8"/>
  <text x="450" y="1464" font-size="11" fill="#94A3B8" text-anchor="middle">금강공업 AX팀 · ERP Track 2 · K-Progress 프로젝트 — 2026.06.04</text>

