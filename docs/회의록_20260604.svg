  <text x="90" y="1067" font-size="10" fill="#92400E" text-anchor="middle">2026.06</text>
  <!-- 8월 -->
  <circle cx="380" cy="1034" r="7" fill="#E8922A"/>
  <text x="380" y="1020" font-size="10" font-weight="bold" fill="#92400E" text-anchor="middle">화면 구현 목표</text>
  <text x="380" y="1055" font-size="10" fill="#92400E" text-anchor="middle">2026.08 말</text>
  <!-- 10월 -->
  <circle cx="660" cy="1034" r="9" fill="#1A3A5C"/>
  <text x="660" y="1019" font-size="10" font-weight="bold" fill="#1A3A5C" text-anchor="middle">구축 완료 목표</text>
  <text x="660" y="1055" font-size="10" fill="#1A3A5C" text-anchor="middle">2026.10 전</text>

  <rect x="700" y="874" width="60" height="20" rx="10" fill="#FFEDD5"/>
  <text x="730" y="888" font-size="10" font-weight="bold" fill="#C2410C" text-anchor="middle">요구 확정</text>

  <!-- ===== 토픽 5: 재고·수불부 ===== -->
  <rect x="32" y="1062" width="836" height="148" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.2"/>
  <rect x="48" y="1078" width="28" height="28" rx="14" fill="#DC2626"/>
  <text x="62" y="1097" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="86" y="1094" font-size="14" font-weight="bold" fill="#1E293B">재고 · 원재료 수불부 처리와 현실적 한계</text>

  <circle cx="60" cy="1118" r="4" fill="#DC2626" opacity="0.4"/>
  <text x="74" y="1122" font-size="12" fill="#334155">원재료 수불·단가 변동 → <tspan font-weight="bold">실시간 전산화 복잡</tspan> (합의)</text>

  <circle cx="60" cy="1140" r="4" fill="#DC2626" opacity="0.4"/>
  <text x="74" y="1144" font-size="12" fill="#334155">현실 방식: 사업장 <tspan font-weight="bold">엑셀 월별 불출 금액 관리</tspan> + 회계 기말 조사·조정 보완</text>

  <circle cx="60" cy="1162" r="4" fill="#DC2626" opacity="0.4"/>
  <text x="74" y="1166" font-size="12" fill="#334155">제공품: 현재 <tspan font-weight="bold">전표 기준</tspan> 처리</text>

  <circle cx="60" cy="1184" r="4" fill="#DC2626" opacity="0.4"/>
  <text x="74" y="1188" font-size="12" fill="#334155">세부 수불 전산화: <tspan font-weight="bold">타 사업장 통일 표준 마련 후</tspan> 시작</text>

  <rect x="700" y="1078" width="60" height="20" rx="10" fill="#FEE2E2"/>
  <text x="730" y="1092" font-size="10" font-weight="bold" fill="#DC2626" text-anchor="middle">후순위</text>

  <!-- ===== 결론 카드 ===== -->
  <rect x="32" y="1224" width="836" height="200" rx="10" fill="#1A3A5C"/>

