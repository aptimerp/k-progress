  <rect x="48" y="524" width="28" height="28" rx="14" fill="#7C3AED"/>
  <text x="62" y="543" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="86" y="540" font-size="14" font-weight="bold" fill="#1E293B">공통비 배부 로직 · 코드(M104) 처리</text>

  <circle cx="60" cy="568" r="4" fill="#7C3AED" opacity="0.4"/>
