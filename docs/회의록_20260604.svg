  <text x="52" y="236" font-size="12" font-weight="bold" fill="#1A3A5C">회의 목적</text>
  <text x="52" y="256" font-size="12" fill="#334155">모듈러 사업부의 원가·공통비 배부 및 관련 전산화(ERP·웹 인터페이스) 추진 방향 정리,</text>
