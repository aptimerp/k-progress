  <circle cx="60" cy="422" r="4" fill="#2563EB" opacity="0.4"/>
  <text x="74" y="426" font-size="12" fill="#334155">퇴직급여·노무비·급여: 전산 기본 데이터 존재 →  <tspan font-weight="bold">부서기준 취합 + 개인별 확인 병행</tspan></text>

  <circle cx="60" cy="444" r="4" fill="#2563EB" opacity="0.4"/>
  <text x="74" y="448" font-size="12" fill="#334155">ERP 인사급여와 대조용 <tspan font-weight="bold">개인별 퍼센티지·검증 데이터</tspan> 필요</text>

  <circle cx="60" cy="466" r="4" fill="#2563EB" opacity="0.4"/>
  <text x="74" y="470" font-size="12" fill="#334155">선급비 등 일부 항목: 전산화 우선순위 제외 → <tspan font-weight="bold">수기 입력 후 추후 자동화</tspan> 전환</text>

