  <rect x="48" y="874" width="28" height="28" rx="14" fill="#E8922A"/>
  <text x="62" y="893" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="86" y="890" font-size="14" font-weight="bold" fill="#1E293B">ERP · 웹 화면 개발 및 일정</text>

  <circle cx="60" cy="914" r="4" fill="#E8922A" opacity="0.5"/>
