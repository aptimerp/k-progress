  <circle cx="60" cy="778" r="4" fill="#059669" opacity="0.4"/>
  <text x="74" y="782" font-size="12" fill="#334155">급여·4대보험·예수금 귀속 문제 → <tspan font-weight="bold">인사·회계 검토 병행</tspan> 필수</text>

  <circle cx="60" cy="800" r="4" fill="#059669" opacity="0.4"/>
  <text x="74" y="804" font-size="12" fill="#334155">일부 인력(자격증·현지 근무) 이전 불가 →<tspan font-weight="bold"> 부서 기준 조회 로직 병행 적용</tspan></text>

  <!-- 이체 방향 시각화 -->
  <rect x="74" y="818" width="90" height="26" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.2"/>
  <text x="119" y="835" font-size="12" font-weight="bold" fill="#065F46" text-anchor="middle">진천 공장</text>
  <text x="180" y="835" font-size="18" fill="#059669">⟶</text>
  <rect x="204" y="818" width="90" height="26" rx="6" fill="#059669"/>
